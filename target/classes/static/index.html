<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futu Stock Monitor</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --blue: #58a6ff;
    --yellow: #d29922;
    --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.5;
    padding: 20px;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
  .status-dot.up { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.down { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 12px;
    color: var(--text-dim);
    font-family: "SF Mono", "Cascadia Code", monospace;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.2s, opacity 0.2s;
  }
  .btn:hover { border-color: var(--blue); }
  .btn:disabled { opacity: 0.5; cursor: wait; }
  .btn .spinner {
    width: 12px; height: 12px;
    border: 2px solid var(--text-dim);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .card-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .card-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
  }
  .card-row .label { color: var(--text-dim); font-size: 13px; }
  .card-row .value {
    font-family: "SF Mono", "Cascadia Code", monospace;
    font-size: 13px;
    font-weight: 600;
  }
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .pill.green { background: rgba(63,185,80,0.15); color: var(--green); }
  .pill.red { background: rgba(248,81,73,0.15); color: var(--red); }
  .pill.blue { background: rgba(88,166,255,0.15); color: var(--blue); }
  .pill.yellow { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .pill.dim { background: rgba(139,148,158,0.15); color: var(--text-dim); }
  .pill.session-regular { background: rgba(63,185,80,0.15); color: var(--green); }
  .pill.session-pre { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .pill.session-after { background: rgba(188,140,255,0.15); color: var(--purple); }
  .pill.session-overnight { background: rgba(188,140,255,0.15); color: var(--purple); }
  .pill.session-closed { background: rgba(139,148,158,0.15); color: var(--text-dim); }
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .section-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-header .count {
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 400;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    text-align: left;
    padding: 8px 16px;
    color: var(--text-dim);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 8px 16px;
    border-bottom: 1px solid rgba(48,54,61,0.5);
  }
  tr:last-child td { border-bottom: none; }
  td.num, th.num { text-align: right; font-family: "SF Mono", "Cascadia Code", monospace; }
  .up-text { color: var(--green); }
  .down-text { color: var(--red); }
  .empty-state {
    padding: 40px 16px;
    text-align: center;
    color: var(--text-dim);
  }
  .alerts-list { padding: 4px 0; }
  .alert-item {
    display: grid;
    grid-template-columns: 70px 1fr auto auto;
    gap: 12px;
    align-items: center;
    padding: 8px 16px;
    border-bottom: 1px solid rgba(48,54,61,0.5);
    font-size: 13px;
  }
  .alert-item:last-child { border-bottom: none; }
  .alert-time {
    color: var(--text-dim);
    font-family: "SF Mono", "Cascadia Code", monospace;
    font-size: 12px;
  }
  .alert-stock { font-weight: 600; }
  .alert-detail { color: var(--text-dim); }
  .alert-price {
    font-family: "SF Mono", "Cascadia Code", monospace;
    font-weight: 600;
  }
  @media (max-width: 640px) {
    .cards { grid-template-columns: 1fr; }
    .alert-item { grid-template-columns: 60px 1fr; }
    .alert-item .alert-price, .alert-item .alert-session { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>
    <span class="status-dot" id="conn-dot"></span>
    Futu Stock Monitor
  </h1>
  <div class="header-right">
    <button class="btn" id="refresh-btn" onclick="manualRefresh()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      <span id="refresh-label">Refresh</span>
    </button>
    <span id="update-time">--</span>
  </div>
</div>

<div class="cards" id="cards"></div>

<div class="section">
  <div class="section-header">
    <span>Stocks</span>
    <span class="count" id="stock-count"></span>
  </div>
  <div id="stock-table-wrap"></div>
</div>

<div class="section">
  <div class="section-header">
    <span>Recent Alerts</span>
    <span class="count" id="alert-count"></span>
  </div>
  <div class="alerts-list" id="alerts-list"></div>
</div>

<script>
function fmtPrice(v) {
  if (v === null || v === undefined) return '--';
  return Number(v).toFixed(2);
}
function fmtPct(v) {
  if (v === null || v === undefined) return '';
  const s = v > 0 ? '+' : '';
  return s + Number(v).toFixed(2) + '%';
}
function fmtTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString('zh-CN', { hour12: false });
}
function fmtFullTime(ts) {
  const d = new Date(ts);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return mm + '/' + dd + ' ' + d.toLocaleTimeString('zh-CN', { hour12: false });
}

function sessionPillClass(session) {
  switch(session) {
    case '盘中': return 'pill session-regular';
    case '盘前': return 'pill session-pre';
    case '盘后': return 'pill session-after';
    case '夜盘': return 'pill session-overnight';
    default: return 'pill session-closed';
  }
}

async function manualRefresh() {
  const btn = document.getElementById('refresh-btn');
  const label = document.getElementById('refresh-label');
  btn.disabled = true;
  label.innerHTML = '<span class="spinner"></span>';
  try {
    await fetch('/api/refresh-prices', { method: 'POST' });
    await refresh();
    label.textContent = 'Done';
  } catch(e) {
    label.textContent = 'Error';
  }
  setTimeout(function() { btn.disabled = false; label.textContent = 'Refresh'; }, 1500);
}

function renderCards(d) {
  const c = d.connection;
  const m = d.monitoring;
  const cfg = d.config;
  const dotClass = c.ready ? 'up' : 'down';
  const dotText = c.ready ? 'Connected' : 'Disconnected';
  const monPill = m.enabled
    ? '<span class="pill green">Active</span>'
    : '<span class="pill dim">Standby</span>';

  document.getElementById('conn-dot').className = 'status-dot ' + dotClass;
  document.getElementById('cards').innerHTML = `
    <div class="card">
      <div class="card-title">Connection</div>
      <div class="card-row"><span class="label">OpenD</span><span class="value">${c.opendIp}:${c.opendPort}</span></div>
      <div class="card-row"><span class="label">Status</span><span class="pill ${dotClass}">${dotText}</span></div>
    </div>
    <div class="card">
      <div class="card-title">Monitoring</div>
      <div class="card-row"><span class="label">State</span>${monPill}</div>
      <div class="card-row"><span class="label">Stocks</span><span class="value">${m.stockCount}</span></div>
      <div class="card-row"><span class="label">K-line cached</span><span class="value">${m.klineCachedCount}</span></div>
    </div>
    <div class="card">
      <div class="card-title">Config</div>
      <div class="card-row"><span class="label">MA periods</span><span class="value">${cfg.maPeriods.join(', ')}</span></div>
      <div class="card-row"><span class="label">Fluctuation</span><span class="value">+/-${cfg.priceChangeThreshold}%</span></div>
      <div class="card-row"><span class="label">Cooldown</span><span class="value">${cfg.alertCooldownMinutes} min</span></div>
      <div class="card-row"><span class="label">Group</span><span class="value">${cfg.groupName}</span></div>
    </div>
  `;
}

function renderStocks(stocks) {
  document.getElementById('stock-count').textContent = stocks.length + ' stocks';
  if (stocks.length === 0) {
    document.getElementById('stock-table-wrap').innerHTML =
      '<div class="empty-state">No stocks loaded. Check OpenD connection and stock group.</div>';
    return;
  }
  let rows = stocks.map(function(s) {
    const hasPrice = s.price !== undefined;
    const pct = hasPrice ? s.changePercent : null;
    const pctClass = pct > 0 ? 'up-text' : pct < 0 ? 'down-text' : '';
    const pctStr = hasPrice ? fmtPct(pct) : '--';
    const mk = s.key ? s.key.split('.')[0] : '';
    return `<tr style="cursor:pointer" onclick="window.location.href='/stock.html?market=${mk}&code=${encodeURIComponent(s.code)}'">
      <td>${s.code}</td>
      <td>${s.name || '--'}</td>
      <td><span class="pill dim">${s.market}</span></td>
      <td class="num">${hasPrice ? fmtPrice(s.price) : '--'}</td>
      <td class="num ${pctClass}">${pctStr}</td>
      <td><span class="${sessionPillClass(s.session)}">${s.session}</span></td>
    </tr>`;
  }).join('');
  document.getElementById('stock-table-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Code</th><th>Name</th><th>Market</th>
        <th class="num">Price</th><th class="num">Change</th><th>Session</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function renderAlerts(alerts) {
  document.getElementById('alert-count').textContent = alerts.length + ' events';
  if (alerts.length === 0) {
    document.getElementById('alerts-list').innerHTML =
      '<div class="empty-state">No alerts yet. Events will appear here when triggered.</div>';
    return;
  }
  let items = alerts.map(function(a) {
    const typeClass = a.type === 'MA' ? 'yellow' : 'blue';
    const typeLabel = a.type === 'MA' ? 'MA' : 'Price';
    return `<div class="alert-item">
      <span class="alert-time">${fmtTime(a.timestamp)}</span>
      <span>
        <span class="alert-stock">${a.stockName || a.stockKey}</span>
        <span class="alert-detail" style="margin-left:8px">
          <span class="pill ${typeClass}">${typeLabel}</span> ${a.detail}
        </span>
      </span>
      <span class="alert-price">${fmtPrice(a.price)}</span>
      <span class="${sessionPillClass(a.session)}">${a.session}</span>
    </div>`;
  }).join('');
  document.getElementById('alerts-list').innerHTML = items;
}

async function refresh() {
  try {
    const resp = await fetch('/api/status');
    const d = await resp.json();
    document.getElementById('update-time').textContent =
      'Updated ' + fmtFullTime(Date.now());
    renderCards(d);
    renderStocks(d.stocks || []);
    renderAlerts(d.recentAlerts || []);
  } catch (e) {
    document.getElementById('conn-dot').className = 'status-dot down';
    document.getElementById('update-time').textContent = 'Fetch failed: ' + e.message;
  }
}

refresh();
setInterval(refresh, 5000);
</script>

</body>
</html>
