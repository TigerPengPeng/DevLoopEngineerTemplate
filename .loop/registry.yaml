coordination:
  priority: [regression, test, code, arch, design, prd]
  conflict_detection: acting_on-field-in-state-files
  freeze_unfreeze: documented-in-LOOP-STATE.md

safety:
  denylist:
    - ".env*"
    - "**/secrets/**"
    - "**/credentials/**"
    - "auth/**"
    - "payments/**"
    - "billing/**"
    - "**/migrations/**"
  auto_merge: false
  human_gates:
    - auth-security
    - payments-billing
    - infrastructure
    - dependency-upgrades
    - files-changed-gt-10
    - fix-attempt-3-failed
    - prd-positioning-change
    - unfreeze-request
  kill_switch: loop-pause-all-label-or-state-flag

budget:
  daily_cap: 3M
  per_run_max_subagents: 3
  per_task_max_fix_attempts: 3
  on_exceed: pause-schedulers-and-notify
