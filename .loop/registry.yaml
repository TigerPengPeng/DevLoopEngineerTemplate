# 闭环系统阶段 Loop 注册表（机器可读）
# 基于 loop-engineering patterns/registry.yaml 格式

version: 1
loops:
  - id: prd
    name: PRD Loop
    goal: 从模糊需求产出结构化 PRD，约束产品范围
    trigger: event
    level: L1
    skills: [prd-author, loop-verifier]
    state_file: .loop/phases/prd-state.md
    output: docs/PRD.md
    freeze_condition: verifier-pass + human-confirm-mvp
    downstream: design
    budget_per_run: 100k
    cadence: on-demand

  - id: design
    name: Design Loop
    goal: 基于 PRD 产出视觉交互规范
    trigger: upstream-frozen
    level: L1
    skills: [design-extractor, loop-verifier]
    state_file: .loop/phases/design-state.md
    output: docs/DESIGN.md
    freeze_condition: verifier-pass + human-confirm-style
    downstream: arch
    budget_per_run: 100k
    cadence: on-demand

  - id: arch
    name: Architecture Loop
    goal: 基于 PRD+DESIGN 产出技术架构和任务清单
    trigger: upstream-frozen
    level: L1
    skills: [arch-planner, loop-verifier]
    state_file: .loop/phases/arch-state.md
    output: [docs/ARCHITECTURE.md, TODO.md]
    freeze_condition: verifier-pass + human-confirm-techstack
    downstream: code
    budget_per_run: 150k
    cadence: on-demand

  - id: code
    name: Code Loop
    goal: 按 TODO.md 顺序逐个实现模块
    trigger: upstream-frozen
    level: L2
    skills: [code-implementer, minimal-fix, loop-verifier]
    state_file: .loop/phases/code-state.md
    output: git-commit
    freeze_condition: all-tasks-done + unit-tests-pass
    downstream: test
    budget_per_run: 200k
    cadence: continuous
    isolation: worktree
    max_fix_attempts: 3

  - id: test
    name: Test Loop
    goal: 集成测试 + 端到端主流程验证
    trigger: upstream-complete
    level: L2
    skills: [test-runner, loop-verifier]
    state_file: .loop/phases/test-state.md
    output: test-report
    freeze_condition: all-acceptance-criteria-tested + main-flow-pass
    downstream: regression
    budget_per_run: 150k
    cadence: on-demand

  - id: regression
    name: Regression Loop
    goal: 回归验证 + 偏差分类 + 反馈信号产出
    trigger: upstream-pass
    level: L1
    skills: [regression-verifier, minimal-fix, loop-verifier]
    state_file: .loop/phases/regression-state.md
    output: regression-report
    freeze_condition: regression-all-pass
    downstream: prd
    budget_per_run: 100k
    cadence: 1d
    max_fix_attempts: 3
    feedback_signals:
      - type: regression
        target: code
      - type: drift
        target: prd
      - type: new-need
        target: human-inbox

# 专业 Agent 目录（领域专家角色）
agents:
  - id: frontend-developer
    name: 前端开发专家
    department: engineering
    dispatch_tag: frontend
    phases: [code]
    file: .loop/agents/engineering/frontend-developer.md

  - id: backend-architect
    name: 后端架构师
    department: engineering
    dispatch_tag: backend
    phases: [arch, code]
    file: .loop/agents/engineering/backend-architect.md

  - id: security-engineer
    name: 安全工程师
    department: engineering
    dispatch_tag: security
    phases: [code]
    file: .loop/agents/engineering/security-engineer.md

  - id: code-reviewer
    name: 代码审查员
    department: engineering
    dispatch_tag: review
    phases: [code]
    file: .loop/agents/engineering/code-reviewer.md

  - id: devops-automator
    name: DevOps 自动化工程师
    department: engineering
    dispatch_tag: devops
    phases: [arch, code]
    file: .loop/agents/engineering/devops-automator.md

  - id: database-optimizer
    name: 数据库优化专家
    department: engineering
    dispatch_tag: database
    phases: [arch, code]
    file: .loop/agents/engineering/database-optimizer.md

  - id: ui-designer
    name: UI 设计师
    department: design
    dispatch_tag: ui
    phases: [design]
    file: .loop/agents/design/ui-designer.md

  - id: interaction-designer
    name: 交互设计师
    department: design
    dispatch_tag: interaction
    phases: [design]
    file: .loop/agents/design/interaction-designer.md

  - id: product-manager
    name: 产品经理
    department: product
    dispatch_tag: product
    phases: [prd]
    file: .loop/agents/product/product-manager.md

  - id: technical-writer
    name: 技术文档工程师
    department: product
    dispatch_tag: docs
    phases: [arch, regression]
    file: .loop/agents/product/technical-writer.md

# 任务标签 → 专业 Agent 派发映射
dispatch:
  - tag: frontend
    agent: .loop/agents/engineering/frontend-developer.md
    phases: [code]
  - tag: backend
    agent: .loop/agents/engineering/backend-architect.md
    phases: [arch, code]
  - tag: security
    agent: .loop/agents/engineering/security-engineer.md
    phases: [code]
  - tag: review
    agent: .loop/agents/engineering/code-reviewer.md
    phases: [code]
  - tag: devops
    agent: .loop/agents/engineering/devops-automator.md
    phases: [arch, code]
  - tag: database
    agent: .loop/agents/engineering/database-optimizer.md
    phases: [arch, code]
  - tag: ui
    agent: .loop/agents/design/ui-designer.md
    phases: [design]
  - tag: interaction
    agent: .loop/agents/design/interaction-designer.md
    phases: [design]
  - tag: product
    agent: .loop/agents/product/product-manager.md
    phases: [prd]
  - tag: docs
    agent: .loop/agents/product/technical-writer.md
    phases: [arch, regression]
  - tag: default
    agent: null
    description: 无标签时使用阶段 agent 自身人格

coordination:
  priority: [regression, test, code, arch, design, prd]
  conflict_detection: acting_on-field-in-state-files
  freeze_unfreeze: documented-in-LOOP-STATE.md

safety:
  denylist:
    - ".env*"
    - "**/secrets/**"
    - "**/credentials/**"
    - "auth/**"
    - "payments/**"
    - "billing/**"
    - "**/migrations/**"
  auto_merge: false
  human_gates:
    - auth-security
    - payments-billing
    - infrastructure
    - dependency-upgrades
    - files-changed-gt-10
    - fix-attempt-3-failed
    - prd-positioning-change
    - unfreeze-request
  kill_switch: loop-pause-all-label-or-state-flag

budget:
  daily_cap: 3M
  per_run_max_subagents: 3
  per_task_max_fix_attempts: 3
  on_exceed: pause-schedulers-and-notify
