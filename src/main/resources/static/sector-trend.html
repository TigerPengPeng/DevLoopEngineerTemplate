<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行业趋势报告 - Futu Stock Monitor</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --blue: #58a6ff;
    --yellow: #d29922;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    padding: 20px;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--blue); }
  .btn:disabled { opacity: 0.5; cursor: wait; }
  .sentiment-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .sentiment-box .label {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .section-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    text-align: left;
    padding: 8px 12px;
    color: var(--text-dim);
    font-weight: 500;
    font-size: 11px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(48,54,61,0.5);
  }
  td.num, th.num { text-align: center; }
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .pill.green { background: rgba(63,185,80,0.15); color: var(--green); }
  .pill.red { background: rgba(248,81,73,0.15); color: var(--red); }
  .pill.yellow { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .empty-state {
    padding: 40px 16px;
    text-align: center;
    color: var(--text-dim);
  }
  .stock-detail { display: none; }
  .stock-detail.visible { display: block; }
  .toggle-btn { cursor: pointer; font-size: 12px; color: var(--blue); }
</style>
</head>
<body>

<div class="header">
  <h1>行业趋势报告</h1>
  <div style="display:flex;gap:12px">
    <a href="/" class="btn">返回主页</a>
    <button class="btn" id="gen-btn" onclick="generateReport()">立即生成</button>
    <select id="history-select" onchange="loadHistoryReport()" style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:13px">
      <option value="">历史报告</option>
    </select>
  </div>
</div>

<div id="report-container">
  <div class="empty-state">加载中...</div>
</div>

<script>
function fmtPct(v) {
  if (v === null || v === undefined) return '--';
  const s = v > 0 ? '+' : '';
  return s + Number(v).toFixed(2) + '%';
}
function sentimentPill(s) {
  if (s.indexOf('多') >= 0) return 'pill green';
  if (s.indexOf('空') >= 0) return 'pill red';
  return 'pill yellow';
}

async function loadLatest() {
  try {
    const resp = await fetch('/api/sector-trend/latest');
    const d = await resp.json();
    if (d.status === 'ok') {
      renderReport(d.report);
    } else {
      document.getElementById('report-container').innerHTML =
        '<div class="empty-state">尚未生成报告，点击「立即生成」</div>';
    }
  } catch(e) {
    document.getElementById('report-container').innerHTML =
      '<div class="empty-state">加载失败: ' + e.message + '</div>';
  }
}

async function loadHistoryList() {
  try {
    const resp = await fetch('/api/sector-trend/history');
    const d = await resp.json();
    const select = document.getElementById('history-select');
    (d.reports || []).forEach(function(r) {
      const opt = document.createElement('option');
      opt.value = r.date;
      opt.textContent = r.date + ' (' + r.sectorCount + ' sectors)';
      select.appendChild(opt);
    });
  } catch(e) {}
}

async function loadHistoryReport() {
  const date = document.getElementById('history-select').value;
  if (!date) { loadLatest(); return; }
  try {
    const resp = await fetch('/api/sector-trend/' + date);
    const d = await resp.json();
    if (d.status === 'ok') renderReport(d.report);
  } catch(e) {}
}

async function generateReport() {
  const btn = document.getElementById('gen-btn');
  btn.disabled = true; btn.textContent = '生成中...';
  try {
    const resp = await fetch('/api/sector-trend/generate', { method: 'POST' });
    const d = await resp.json();
    if (d.status === 'ok') renderReport(d.report);
    btn.textContent = 'Done';
  } catch(e) { btn.textContent = 'Error'; }
  setTimeout(function() { btn.disabled = false; btn.textContent = '立即生成'; }, 2000);
}

function renderReport(report) {
  let html = '<div class="sentiment-box">' +
    '<div class="label">市场总览 (' + report.date + ')</div>' +
    '<div style="font-size:15px">' + report.overallSentiment + '</div>' +
    '</div>';

  html += '<div class="section"><div class="section-header"><span>板块分析</span><span style="color:var(--text-dim);font-size:12px">' + report.sectors.length + ' 个板块</span></div>';
  html += '<table><thead><tr>' +
    '<th>板块</th><th class="num">成分</th><th class="num">看多</th><th class="num">看空</th>' +
    '<th class="num">5日%</th><th class="num">20日%</th><th class="num">情绪</th><th class="num">风险</th>' +
    '</tr></thead><tbody>';

  report.sectors.forEach(function(s, i) {
    var c5 = s.avgChange5d >= 0 ? 'green' : 'red';
    var c20 = s.avgChange20d >= 0 ? 'green' : 'red';
    html += '<tr>' +
      '<td style="font-weight:600">' + s.sectorName + '</td>' +
      '<td class="num">' + s.memberCount + '</td>' +
      '<td class="num" style="color:var(--green)">' + s.bullishCount + '</td>' +
      '<td class="num" style="color:var(--red)">' + s.bearishCount + '</td>' +
      '<td class="num" style="color:var(--' + c5 + ')">' + fmtPct(s.avgChange5d) + '</td>' +
      '<td class="num" style="color:var(--' + c20 + ')">' + fmtPct(s.avgChange20d) + '</td>' +
      '<td class="num"><span class="' + sentimentPill(s.sentiment) + '">' + s.sentiment + '</span></td>' +
      '<td class="num" style="font-weight:700">' + Math.round(s.riskScore) + '</td>' +
      '</tr>';
  });
  html += '</tbody></table></div>';

  report.sectors.forEach(function(s, i) {
    if (s.stocks.length === 0) return;
    html += '<div class="section"><div class="section-header">' +
      '<span>' + s.sectorName + ' - 成分股明细</span>' +
      '<span class="toggle-btn" onclick="var el=document.getElementById(\'detail-' + i + '\');el.classList.toggle(' + '\'visible' + '\')">展开/收起</span>' +
      '</div><div class="stock-detail" id="detail-' + i + '"><table><thead><tr>' +
      '<th>股票</th><th class="num">现价</th><th class="num">5日%</th><th class="num">趋势</th><th class="num">跌破均线</th>' +
      '</tr></thead><tbody>';
    s.stocks.forEach(function(st) {
      var tc = st.trend === '看多' ? 'green' : st.trend === '看空' ? 'red' : 'var(--text-dim)';
      var cc = st.change5d >= 0 ? 'green' : 'red';
      var below = st.belowMA.length === 0 ? '-' : st.belowMA.map(function(p){return 'MA'+p}).join(' ');
      html += '<tr>' +
        '<td>' + st.stockName + ' <span style="color:var(--text-dim);font-size:11px">' + st.stockKey + '</span></td>' +
        '<td class="num">' + (st.currentPrice > 0 ? st.currentPrice.toFixed(2) : '--') + '</td>' +
        '<td class="num" style="color:var(--' + cc + ')">' + fmtPct(st.change5d) + '</td>' +
        '<td class="num" style="color:var(--' + tc + ');font-weight:600">' + st.trend + '</td>' +
        '<td class="num" style="color:' + (st.belowMA.length > 0 ? 'var(--red)' : 'var(--text-dim)') + '">' + below + '</td>' +
        '</tr>';
    });
    html += '</tbody></table></div></div>';
  });

  document.getElementById('report-container').innerHTML = html;
}

loadLatest();
loadHistoryList();
</script>

</body>
</html>
